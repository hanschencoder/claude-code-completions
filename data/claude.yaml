name: claude
description: Claude Code - starts an interactive session by default, use -p/--print
  for
options:
- flags:
  - --add-dir
  description: Additional directories to allow tool access to
- flags:
  - --agent
  description: Agent for the current session. Overrides the 'agent' setting.
- flags:
  - --agents
  description: 'JSON object defining custom agents (e.g. ''{"reviewer": {"description":
    "Reviews code", "prompt": "You are a code reviewer"}}'')'
- flags:
  - --allow-dangerously-skip-permissions
  description: Enable bypassing all permission checks as an option, without it being
    enabled by default. Recommended only for sandboxes with no internet access.
- flags:
  - --allowedTools
  - --allowed-tools
  description: Comma or space-separated list of tool names to allow (e.g. "Bash(git:*)
    Edit")
- flags:
  - --append-system-prompt
  description: Append a system prompt to the default system prompt
- flags:
  - --betas
  description: Beta headers to include in API requests (API key users only)
- flags:
  - --brief
  description: Enable SendUserMessage tool for agent-to-user communication
- flags:
  - --chrome
  description: Enable Claude in Chrome integration
- flags:
  - -c
  - --continue
  description: Continue the most recent conversation in the current directory
- flags:
  - --dangerously-skip-permissions
  description: Bypass all permission checks. Recommended only for sandboxes with no
    internet access.
- flags:
  - -d
  - --debug
  description: Enable debug mode with optional category filtering (e.g., "api,hooks"
    or "!1p,!file")
- flags:
  - --debug-file
  description: Write debug logs to a specific file path (implicitly enables debug
    mode)
- flags:
  - --disable-slash-commands
  description: Disable all skills
- flags:
  - --disallowedTools
  - --disallowed-tools
  description: Comma or space-separated list of tool names to deny (e.g. "Bash(git:*)
    Edit")
- flags:
  - --effort
  description: Effort level for the current session (low, medium, high, max)
- flags:
  - --fallback-model
  description: Enable automatic fallback to specified model when default model is
    overloaded (only works with --print)
- flags:
  - --file
  description: 'File resources to download at startup. Format: file_id:relative_path
    (e.g., --file file_abc:doc.txt file_def:img.png)'
- flags:
  - --fork-session
  description: When resuming, create a new session ID instead of reusing the original
    (use with --resume or --continue)
- flags:
  - --from-pr
  description: Resume a session linked to a PR by PR number/URL, or open interactive
    picker with optional search term
- flags:
  - -h
  - --help
  description: Display help for command
- flags:
  - --ide
  description: Automatically connect to IDE on startup if exactly one valid IDE is
    available
- flags:
  - --include-partial-messages
  description: Include partial message chunks as they arrive (only works with --print
    and --output-format=stream-json)
- flags:
  - --input-format
  description: 'Input format (only works with --print): "text" (default), or "stream-json"
    (realtime streaming input) (choices: "text", "stream-json")'
- flags:
  - --json-schema
  description: 'JSON Schema for structured output validation. Example: {"type":"object","properties":{"name":{"type":"string"}},"required":["name"]}'
- flags:
  - --max-budget-usd
  description: Maximum dollar amount to spend on API calls (only works with --print)
- flags:
  - --mcp-config
  description: Load MCP servers from JSON files or strings (space-separated)
- flags:
  - --mcp-debug
  description: '[DEPRECATED. Use --debug instead] Enable MCP debug mode (shows MCP
    server errors)'
- flags:
  - --model
  description: Model for the current session. Provide an alias for the latest model
    (e.g. 'sonnet' or 'opus') or a model's full name (e.g. 'claude-sonnet-4-6').
- flags:
  - -n
  - --name
  description: Set a display name for this session (shown in /resume and terminal
    title)
- flags:
  - --no-chrome
  description: Disable Claude in Chrome integration
- flags:
  - --no-session-persistence
  description: Disable session persistence - sessions will not be saved to disk and
    cannot be resumed (only works with --print)
- flags:
  - --output-format
  description: 'Output format (only works with --print): "text" (default), "json"
    (single result), or "stream-json" (realtime streaming) (choices: "text", "json",
    "stream-json")'
- flags:
  - --permission-mode
  description: 'Permission mode to use for the session (choices: "acceptEdits", "bypassPermissions",
    "default", "dontAsk", "plan", "auto")'
- flags:
  - --plugin-dir
  description: 'Load plugins from a directory for this session only (repeatable: --plugin-dir
    A --plugin-dir B) (default: [])'
- flags:
  - -p
  - --print
  description: 'Print response and exit (useful for pipes). Note: The workspace trust
    dialog is skipped when Claude is run with the -p mode. Only use this flag in directories
    you trust.'
- flags:
  - --replay-user-messages
  description: Re-emit user messages from stdin back on stdout for acknowledgment
    (only works with --input-format=stream-json and --output-format=stream-json)
- flags:
  - -r
  - --resume
  description: Resume a conversation by session ID, or open interactive picker with
    optional search term
- flags:
  - --session-id
  description: Use a specific session ID for the conversation (must be a valid UUID)
- flags:
  - --setting-sources
  description: Comma-separated list of setting sources to load (user, project, local).
- flags:
  - --settings
  description: Path to a settings JSON file or a JSON string to load additional settings
    from
- flags:
  - --strict-mcp-config
  description: Only use MCP servers from --mcp-config, ignoring all other MCP configurations
- flags:
  - --system-prompt
  description: System prompt to use for the session
- flags:
  - --tmux
  description: Create a tmux session for the worktree (requires --worktree). Uses
    iTerm2 native panes when available; use --tmux=classic for traditional tmux.
- flags:
  - --tools
  description: Specify the list of available tools from the built-in set. Use "" to
    disable all tools, "default" to use all tools, or specify tool names (e.g. "Bash,Edit,Read").
- flags:
  - --verbose
  description: Override verbose mode setting from config
- flags:
  - -v
  - --version
  description: Output the version number
- flags:
  - -w
  - --worktree
  description: Create a new git worktree for this session (optionally specify a name)
